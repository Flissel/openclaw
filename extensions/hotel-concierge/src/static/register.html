<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel Concierge - Registrierung</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
    }
    .logo { text-align: center; margin-bottom: 24px; }
    .logo h1 { font-size: 24px; color: #333; }
    .logo p { color: #666; font-size: 14px; margin-top: 8px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-weight: 600; color: #333; margin-bottom: 6px; font-size: 14px; }
    input[type="tel"], select {
      width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0;
      border-radius: 8px; font-size: 16px; transition: border-color 0.2s;
      outline: none;
    }
    input[type="tel"]:focus, select:focus { border-color: #667eea; }
    .checkbox-group {
      display: flex; align-items: flex-start; gap: 10px;
      margin-bottom: 24px; font-size: 13px; color: #555;
    }
    .checkbox-group input[type="checkbox"] {
      margin-top: 2px; width: 18px; height: 18px; flex-shrink: 0;
    }
    .checkbox-group a { color: #667eea; text-decoration: none; }
    .checkbox-group a:hover { text-decoration: underline; }
    button {
      width: 100%; padding: 14px; background: #667eea;
      color: #fff; border: none; border-radius: 8px;
      font-size: 16px; font-weight: 600; cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #5a6fd6; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .message {
      margin-top: 16px; padding: 12px; border-radius: 8px;
      font-size: 14px; text-align: center;
    }
    .message.success { background: #d4edda; color: #155724; }
    .message.error { background: #f8d7da; color: #721c24; }
    .whatsapp-hint {
      margin-top: 20px; text-align: center; font-size: 13px; color: #888;
    }
    .whatsapp-hint strong { color: #25D366; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>Willkommen im Hotel</h1>
      <p>Registrieren Sie sich für unseren WhatsApp Concierge-Service</p>
    </div>

    <form id="regForm">
      <div class="form-group">
        <label for="phone">Telefonnummer (WhatsApp)</label>
        <input type="tel" id="phone" name="phone_number"
               placeholder="+49 151 12345678"
               pattern="^\+[1-9]\d{6,14}$"
               required>
      </div>

      <div class="form-group">
        <label for="days">Zugang für</label>
        <select id="days" name="access_days">
          <option value="1">1 Tag</option>
          <option value="2" selected>2 Tage</option>
          <option value="3">3 Tage</option>
          <option value="4">4 Tage</option>
        </select>
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="agb" name="agb_accepted" required>
        <label for="agb" style="font-weight: normal; margin-bottom: 0;">
          Ich akzeptiere die <a href="/concierge/agb" target="_blank">AGB und Datenschutzbestimmungen</a>.
          Meine Telefonnummer wird temporär gespeichert und nach Ablauf der gewählten Dauer automatisch gelöscht.
        </label>
      </div>

      <button type="submit" id="submitBtn">Registrieren</button>
    </form>

    <div id="message" class="message" style="display: none;"></div>

    <div class="whatsapp-hint">
      Nach der Registrierung können Sie uns direkt per <strong>WhatsApp</strong> kontaktieren.
    </div>
  </div>

  <script>
    const form = document.getElementById('regForm');
    const messageEl = document.getElementById('message');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = 'Wird registriert...';
      messageEl.style.display = 'none';

      // Normalize phone: remove spaces and dashes
      const phoneInput = document.getElementById('phone');
      const phone = phoneInput.value.replace(/[\s\-()]/g, '');

      try {
        const response = await fetch('/concierge/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            phone_number: phone,
            access_days: parseInt(document.getElementById('days').value),
            agb_accepted: document.getElementById('agb').checked,
          }),
        });

        const data = await response.json();

        if (data.success) {
          messageEl.className = 'message success';
          messageEl.textContent = data.message;
          form.style.display = 'none';
        } else {
          messageEl.className = 'message error';
          messageEl.textContent = data.error;
        }
      } catch (err) {
        messageEl.className = 'message error';
        messageEl.textContent = 'Verbindungsfehler. Bitte versuchen Sie es erneut.';
      }

      messageEl.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Registrieren';
    });
  </script>
</body>
</html>
